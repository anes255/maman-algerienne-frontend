<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" id="favicon" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#FF69B4" />
    <meta
      name="description"
      content="Maman Algérienne - مجتمعكن الآمن للحصول على النصائح والمنتجات المناسبة لكن ولعائلتكن"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Maman Algérienne - مامان الجزائرية</title>
    <script>
      // Dynamic favicon from theme
      fetch('http://localhost:5000/api/theme')
        .then(res => res.json())
        .then(theme => {
          if (theme.favicon) {
            document.getElementById('favicon').href = 'http://localhost:5000' + theme.favicon;
          }
        })
        .catch(err => console.log('Favicon load error:', err));
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
